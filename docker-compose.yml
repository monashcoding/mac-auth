# MAC central auth service — full stack.
#
# One command to run everything:  docker compose up -d
# Services: caddy (TLS reverse proxy) -> auth (Node/Better Auth) -> postgres, plus a
# nightly pg_dump backup sidecar. Fill .env first (see .env.example).

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - auth

  auth:
    build:
      context: ./auth
    restart: unless-stopped
    environment:
      # Assembled DB URL for the postgres.js driver.
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      PORT: "3000"
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backup:
    # Same postgres:16 image (no third-party backup image). Runs an internal loop
    # that pg_dumps nightly with rotation — no host cron.
    image: postgres:16
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      # Keep this many daily dumps.
      BACKUP_KEEP_DAYS: "14"
    volumes:
      - ./backup/backup.sh:/usr/local/bin/backup.sh:ro
      - ./backups:/backups
    entrypoint: ["/bin/sh", "/usr/local/bin/backup.sh"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
  caddy_data:
  caddy_config:
